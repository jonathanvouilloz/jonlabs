name: Scheduled publish (mardi/vendredi)

# Cadence éditoriale jonlabs : 2 articles/semaine (mardi + vendredi).
# Le site est statique : un article daté du futur (pubDate) reste masqué
# jusqu'à un rebuild postérieur à sa date. Ce cron redéploie le site
# chaque mardi et vendredi matin pour faire passer en ligne les articles
# dont le pubDate est arrivé à échéance.
#
# Pré-requis : créer un Deploy Hook côté Vercel
#   Vercel → Project → Settings → Git → Deploy Hooks (branche main)
# puis l'enregistrer en secret GitHub :
#   Repo → Settings → Secrets and variables → Actions → New secret
#   Name: VERCEL_DEPLOY_HOOK_URL

on:
  schedule:
    # 05:00 UTC = 07:00 CEST. minute heure jour mois jour-semaine (2=mardi, 5=vendredi)
    - cron: '0 5 * * 2,5'
  workflow_dispatch: {}

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::Secret VERCEL_DEPLOY_HOOK_URL manquant. Voir l'en-tête de ce workflow."
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
          echo "Rebuild Vercel déclenché."
