<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reddit Scraper Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #dae0e6;
    --surface: #ffffff;
    --surface2: #f6f7f8;
    --border: #edeff1;
    --text: #1c1c1c;
    --text-muted: #878a8c;
    --accent: #ff4500;
    --accent-dim: #fff4f1;
    --green: #46d160;
    --radius: 4px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  aside {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h2 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-muted);
  }

  .file-list {
    overflow-y: auto;
    flex: 1;
    padding: 6px;
  }

  .file-item {
    padding: 9px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .1s;
    border: 1px solid transparent;
  }

  .file-item:hover { background: var(--surface2); }

  .file-item.active {
    background: var(--accent-dim);
    border-color: rgba(255,69,0,.2);
  }

  .file-name {
    font-size: 11px;
    color: var(--text-muted);
    word-break: break-all;
    margin-bottom: 2px;
  }

  .file-keyword {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    word-break: break-word;
  }

  .file-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .empty-sidebar {
    padding: 20px 16px;
    color: var(--text-muted);
    font-size: 12px;
    text-align: center;
  }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── SEARCH BAR ── */
  .search-bar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .logo {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -.01em;
    white-space: nowrap;
  }

  .logo span { color: var(--text-muted); font-weight: 400; }

  .input-group {
    display: flex;
    gap: 8px;
    flex: 1;
    min-width: 0;
    align-items: center;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: "Segoe UI", system-ui, sans-serif;
    outline: none;
    transition: border-color .15s;
    min-width: 0;
  }

  input[type="text"]:focus {
    border-color: #0079d3;
    background: #fff;
  }

  .threads-input {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    color: var(--text-muted);
    font-size: 13px;
  }

  input[type="number"] {
    width: 52px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 6px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: "Segoe UI", system-ui, sans-serif;
    outline: none;
    text-align: center;
  }

  input[type="number"]:focus { border-color: #0079d3; background: #fff; }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 7px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: "Segoe UI", system-ui, sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background .1s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button:hover:not(:disabled) { background: #e03d00; }
  button:active:not(:disabled) { background: #c93600; }
  button:disabled { opacity: .5; cursor: not-allowed; }

  .spinner {
    width: 13px;
    height: 13px;
    border: 2px solid rgba(255,255,255,.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }

  .spinner.show { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STATS BAR ── */
  .stats-bar {
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 36px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: #ea0027; }
  .status-dot.loading {
    background: var(--accent);
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }

  /* ── RESULTS ── */
  .results {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 10px;
    padding: 40px;
    text-align: center;
  }

  .empty-state .icon { font-size: 36px; opacity: .35; }
  .empty-state p { font-size: 13px; max-width: 280px; }

  /* ── THREAD CARD ── */
  details.thread-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  details.thread-card summary {
    padding: 11px 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    user-select: none;
    list-style: none;
    border-radius: var(--radius);
    transition: background .1s;
  }

  details.thread-card[open] summary { border-radius: var(--radius) var(--radius) 0 0; }
  details.thread-card summary:hover { background: var(--surface2); }
  details.thread-card summary::-webkit-details-marker { display: none; }
  details.thread-card summary::marker { display: none; }

  .chevron {
    flex-shrink: 0;
    color: var(--text-muted);
    font-size: 9px;
    margin-top: 4px;
    transition: transform .18s;
  }

  details[open] .chevron { transform: rotate(90deg); }

  .thread-title {
    flex: 1;
    font-weight: 600;
    font-size: 13px;
    line-height: 1.4;
    color: var(--text);
  }

  .thread-badge {
    flex-shrink: 0;
    font-size: 11px;
    background: var(--surface2);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 2px;
    white-space: nowrap;
    margin-top: 1px;
    border: 1px solid var(--border);
  }

  .comments-list {
    padding: 10px 14px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--surface2);
    max-height: 520px;
    overflow-y: auto;
    border-radius: 0 0 var(--radius) var(--radius);
  }

  .comment-item {
    padding: 9px 11px;
    background: var(--surface);
    border-radius: var(--radius);
    font-size: 13px;
    color: #3c3c3c;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .body-item {
    border-left: 3px solid var(--accent);
    background: var(--accent-dim);
  }

  .body-label {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--accent);
    margin-bottom: 5px;
    margin-right: 4px;
  }

  /* ── ERROR ── */
  .error-box {
    background: #fff8f8;
    border: 1px solid #f5c6c6;
    border-radius: var(--radius);
    padding: 12px 14px;
    color: #c0392b;
    font-size: 13px;
    font-family: "Segoe UI", monospace;
    white-space: pre-wrap;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #aaa; }
</style>
</head>
<body>

<aside>
  <div class="sidebar-header">
    <h2>Extractions</h2>
  </div>
  <div class="file-list" id="fileList">
    <p class="empty-sidebar">Chargement...</p>
  </div>
</aside>

<main>
  <div class="search-bar">
    <div class="logo">Reddit<span>Scout</span></div>
    <div class="input-group">
      <input type="text" id="keyword" placeholder="mot-clé à scraper…" />
      <div class="threads-input">
        <label for="threads">threads</label>
        <input type="number" id="threads" value="10" min="1" max="50" />
      </div>
      <button id="runBtn" onclick="runScraper()">
        <div class="spinner" id="spinner"></div>
        <span id="btnLabel">Lancer</span>
      </button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statsText">Prêt — choisir un fichier ou lancer une extraction</span>
  </div>

  <div class="results" id="results">
    <div class="empty-state">
      <div class="icon">🔍</div>
      <p>Saisir un mot-clé et cliquer <strong>Lancer</strong>, ou sélectionner une extraction existante dans la barre latérale.</p>
    </div>
  </div>
</main>

<script>
let activeFile = null;

// ── UTILS ──

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
  document.getElementById('statsText').textContent = text;
}

function setLoading(loading) {
  const btn = document.getElementById('runBtn');
  const spinner = document.getElementById('spinner');
  const label = document.getElementById('btnLabel');
  btn.disabled = loading;
  spinner.classList.toggle('show', loading);
  label.textContent = loading ? 'Scraping…' : 'Lancer';
}

function formatDate(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

// ── SIDEBAR ──

async function loadFileList() {
  try {
    const res = await fetch('/api/results');
    const files = await res.json();
    renderFileList(files);
  } catch(e) {
    document.getElementById('fileList').innerHTML =
      '<p class="empty-sidebar">Erreur de connexion au serveur.</p>';
  }
}

function renderFileList(files) {
  const el = document.getElementById('fileList');
  if (!files.length) {
    el.innerHTML = '<p class="empty-sidebar">Aucune extraction trouvée.</p>';
    return;
  }
  el.innerHTML = files.map(f => {
    const keyword = f.keyword || f.name.replace('extraction_reddit_', '').replace('.txt', '').replace(/_/g, ' ');
    return `
    <div class="file-item ${activeFile === f.name ? 'active' : ''}"
         onclick="loadFile('${f.name}')">
      <div class="file-name">${f.name}</div>
      <div class="file-keyword">${keyword}</div>
      <div class="file-meta">${f.size_kb} KB · ${formatDate(f.mtime)}</div>
    </div>`;
  }).join('');
}

// ── LOAD FILE ──

async function loadFile(filename) {
  activeFile = filename;
  setStatus('loading', `Chargement de ${filename}…`);
  renderFileList(await (await fetch('/api/results')).json());

  try {
    const res = await fetch(`/api/load?file=${encodeURIComponent(filename)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderResults(data);
    setStatus('ok', `${data.stats.threads} threads · ${data.stats.comments} commentaires — ${filename}`);
  } catch(e) {
    setStatus('err', `Erreur : ${e.message}`);
    document.getElementById('results').innerHTML = `<div class="error-box">${e.message}</div>`;
  }
}

// ── RUN SCRAPER ──

async function runScraper() {
  const keyword = document.getElementById('keyword').value.trim();
  const threads = parseInt(document.getElementById('threads').value) || 10;

  if (!keyword) {
    document.getElementById('keyword').focus();
    return;
  }

  setLoading(true);
  setStatus('loading', `Scraping "${keyword}" (${threads} threads)… patience ~${threads * 2}s`);
  document.getElementById('results').innerHTML = `
    <div class="empty-state">
      <div class="icon">⏳</div>
      <p>Scraping en cours sur Reddit…<br>Cela prend environ ${threads * 2}–${threads * 3} secondes.</p>
    </div>`;

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keyword, threads }),
    });
    const data = await res.json();

    if (!res.ok || data.error) throw new Error(data.error || 'Erreur inconnue');

    activeFile = data.filename;
    await loadFileList();
    renderResults(data);
    setStatus('ok', `${data.stats.threads} threads · ${data.stats.comments} commentaires — ${data.filename}`);
  } catch(e) {
    setStatus('err', `Erreur : ${e.message}`);
    document.getElementById('results').innerHTML = `<div class="error-box">${e.message}</div>`;
  } finally {
    setLoading(false);
  }
}

// ── RENDER ──

function renderResults(data) {
  const container = document.getElementById('results');

  if (!data.threads || !data.threads.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">😶</div>
        <p>Aucun thread trouvé dans ce fichier.</p>
      </div>`;
    return;
  }

  container.innerHTML = data.threads.map((thread, i) => {
    const body = thread.body
      ? `<div class="comment-item body-item"><span class="body-label">Post</span>${escHtml(thread.body)}</div>`
      : '';
    const comments = thread.comments.map(c =>
      `<div class="comment-item">${escHtml(c)}</div>`
    ).join('');
    const count = thread.comments.length;

    return `
      <details class="thread-card" ${i === 0 ? 'open' : ''}>
        <summary>
          <span class="chevron">▶</span>
          <span class="thread-title">${escHtml(thread.title)}</span>
          <span class="thread-badge">${count} comment${count !== 1 ? 's' : ''}</span>
        </summary>
        <div class="comments-list">${body}${comments || (!body ? '<div class="comment-item" style="color:var(--text-muted)">Aucun commentaire dans ce thread.</div>' : '')}</div>
      </details>`;
  }).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── ENTER KEY ──
document.getElementById('keyword').addEventListener('keydown', e => {
  if (e.key === 'Enter') runScraper();
});

// ── INIT ──
loadFileList();
</script>
</body>
</html>
