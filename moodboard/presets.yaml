version: 1

defaults:
  output_format: webp
  output_quality: 90

placement_to_preset:
  cover: blog-cover-template

brief_type_to_preset:
  cover: blog-cover-template

presets:

  blog-cover-template:
    description: "Cover depuis image de fond statique + texte overlay freetype (aucun appel API)"
    source: template
    template_image: src/assets/bg-template.png
    compose_text: true
    font_file: fonts/PlusJakartaSans-VariableFont_wght.ttf
    text_overlay:
      position: bottom-left
      title_anchor: bottom
      title_y_ratio: 0.90
      gradient: false
      banner: false
      rotation: 0
      uppercase: false
      shadow: false
      text_color: "#1a1a1a"
      font_size_ratio: 0.06    # × largeur image (pas hauteur) — 1920 × 0.06 = 115px
      font_weight: 700
      tracking: -0.04
      line_spacing: 1.1
      max_title_width_ratio: 0.65
    output_dir: public/images/blog
    output_naming: "{slug}.webp"

  linkedin-cover-gemini:
    description: "Cover LinkedIn cartoon/absurde via Gemini, format carré 1:1, aucun overlay texte"
    source: gemini
    base_style_override: flat-illustration
    no_reference: true
    layout_directives: "Generate a square 1:1 cartoon illustration, 1280x1280px, centered composition suitable for a LinkedIn feed post."
    compose_text: false
    output_dir: public/images/linkedin
    output_naming: "{slug}.webp"

  gmb-post-template:
    description: "Image GMB 1200x900 (4:3) — template Jon Labs avec bande noire centrale, titre noir au-dessus, sous-titre lavande dans la bande. Tout config local au projet (couleurs/sizes/positions). Mode dual-text — lu par compose_dual_text_overlay."
    source: template
    template_image: moodboard/refs/gmb-bg.png
    compose_text: true
    font_file: fonts/PlusJakartaSans-VariableFont_wght.ttf
    dimensions: "1200x900"
    # Recommandations longueur (le composer wrap/shrink auto, mais pour briefing humain) :
    # title    : 12-22 caractères (1 ligne, gros) — idéal "Optimiser sa GMB"
    # subtitle : 30-50 caractères (2 lignes max), 4-7 mots
    title_overlay:
      text_color: "#1a1a1a"
      font_size_ratio: 0.10        # 120px sur 1200 de large
      font_weight: 700
      tracking: -0.02
      max_width_ratio: 0.92        # auto-shrink si dépasse 92% de la largeur
      auto_shrink: true
      align: center
      anchor: above_band           # ancre au-dessus de la bande noire pré-existante
      band_top_ratio: 0.5167       # haut de bande à y=465 sur 900
      gap_to_band: 58              # 58px entre bas du titre et haut de bande
      v_offset: 0
    subtitle_overlay:
      text_color: "#00D9A3"        # vert/turquoise brand Jon Labs
      font_size_ratio: 0.060       # 72px sur 1200
      font_weight: 700
      tracking: -0.01
      max_width_ratio: 0.78        # 78% pour wrap propre sur 2 lignes
      line_spacing: 1.1
      align: center
      anchor: band_center          # centré dans la bande noire
      band_top_ratio: 0.5167       # haut de bande
      band_bot_ratio: 0.7767       # bas de bande à y=699 sur 900
      v_offset: -4                 # léger nudge vers le haut pour balance optique
    output_dir: static/gmb-assets
    output_naming: "post-{index:02d}.png"
