version: 1

defaults:
  output_format: webp
  output_quality: 90

placement_to_preset:
  cover: blog-cover-template

brief_type_to_preset:
  cover: blog-cover-template

presets:

  blog-cover-template:
    description: "Cover depuis image de fond statique + texte overlay freetype (aucun appel API)"
    source: template
    template_image: src/assets/bg-template.png
    compose_text: true
    font_file: fonts/PlusJakartaSans-SemiBold.ttf
    text_overlay:
      position: bottom-left
      gradient: false
      banner: false
      rotation: 0
      uppercase: false
      shadow: false
      text_color: "#1a1a1a"
      font_size_ratio: 0.042
      tracking: -0.02
      line_spacing: 1.1
      max_title_width_ratio: 0.65
    output_dir: public/images/blog
    output_naming: "{slug}.webp"
