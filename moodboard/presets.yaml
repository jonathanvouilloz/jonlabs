version: 1

defaults:
  output_format: webp
  output_quality: 90

placement_to_preset:
  cover: blog-cover-template

brief_type_to_preset:
  cover: blog-cover-template

presets:

  blog-cover-template:
    description: "Cover depuis image de fond statique + texte overlay freetype (aucun appel API)"
    source: template
    template_image: src/assets/bg-template.png
    compose_text: true
    font_file: fonts/PlusJakartaSans-VariableFont_wght.ttf
    text_overlay:
      position: bottom-left
      title_anchor: bottom
      title_y_ratio: 0.90
      gradient: false
      banner: false
      rotation: 0
      uppercase: false
      shadow: false
      text_color: "#1a1a1a"
      font_size_ratio: 0.06    # × largeur image (pas hauteur) — 1920 × 0.06 = 115px
      font_weight: 700
      tracking: -0.04
      line_spacing: 1.1
      max_title_width_ratio: 0.65
    output_dir: public/images/blog
    output_naming: "{slug}.webp"

  linkedin-cover-gemini:
    description: "Cover LinkedIn cartoon/absurde via Gemini, format carré 1:1, aucun overlay texte"
    source: gemini
    base_style_override: flat-illustration
    no_reference: true
    layout_directives: "Generate a square 1:1 cartoon illustration, 1280x1280px, centered composition suitable for a LinkedIn feed post."
    compose_text: false
    output_dir: public/images/linkedin
    output_naming: "{slug}.webp"
